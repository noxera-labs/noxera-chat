<svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#0080DD"/>
    </linearGradient>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect width="80" height="80" rx="18" fill="#050507"/>

  <!-- Bold lines — 3.5px stroke so they're visible at 32x32 -->
  <line x1="40" y1="8"  x2="8"  y2="40" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="40" y1="8"  x2="72" y2="40" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="8"  y1="40" x2="40" y2="72" stroke="#00CFFF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.75"/>
  <line x1="72" y1="40" x2="40" y2="72" stroke="#00CFFF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.75"/>
  <line x1="8"  y1="40" x2="72" y2="40" stroke="#00CFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Bold dots -->
  <circle cx="40" cy="8"  r="6" fill="#00CFFF"/>
  <circle cx="40" cy="72" r="5" fill="#00CFFF" fill-opacity="0.85"/>
  <circle cx="8"  cy="40" r="4" fill="#00CFFF" fill-opacity="0.7"/>
  <circle cx="72" cy="40" r="4" fill="#00CFFF" fill-opacity="0.7"/>
  <circle cx="40" cy="40" r="3" fill="#00CFFF" fill-opacity="0.5"/>
</svg>
