<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noxera AI · Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    :root {
      --bg:             #050507;
      --s1:             #0a0a0f;
      --s2:             #111116;
      --border:         rgba(255,255,255,0.07);
      --border-mid:     rgba(255,255,255,0.13);

      --accent:         #00CFFF;
      --accent-dim:     rgba(0,207,255,0.08);
      --accent-glow:    rgba(0,207,255,0.20);
      --accent-border:  rgba(0,207,255,0.22);
      --accent-deep:    #0c8fb8;

      --text:           #F0F0F4;
      --text-mid:       rgba(240,240,244,0.60);
      --text-dim:       rgba(240,240,244,0.36);

      --danger:         #f87171;

      --radius-sm:      8px;
      --radius:         12px;
      --radius-lg:      18px;

      --font-display:   'Space Grotesk', sans-serif;
      --font:           'Plus Jakarta Sans', sans-serif;
      --mono:           'JetBrains Mono', monospace;

      --max-w:          760px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle dot grid */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none; z-index: 0;
    }

    /* Top-left ambient orb */
    body::after {
      content: ''; position: fixed;
      top: -260px; left: -180px; width: 680px; height: 680px;
      background: radial-gradient(circle, rgba(0,207,255,0.07) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    /* Bottom-right ambient orb */
    .bg-orb {
      position: fixed;
      bottom: -200px; right: -160px; width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(0,207,255,0.04) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    /* ─────── Header ─────── */
    header {
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(5,5,7,0.82);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 58px;
      display: flex; align-items: center; gap: 0;
    }

    .header-logo {
      height: 26px; width: auto;
      display: block;
    }

    .header-divider {
      width: 1px; height: 18px;
      background: var(--border-mid);
      margin: 0 18px;
    }

    .header-tag {
      font-family: var(--mono);
      font-size: 0.66rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      padding: 3px 9px;
      border-radius: 4px;
    }

    .header-spacer { flex: 1; }

    .header-status {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--text-dim);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 7px rgba(34,197,94,0.55);
    }

    /* ─────── Main ─────── */
    main {
      flex: 1;
      position: relative; z-index: 1;
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 16px 240px;
    }

    .stream {
      width: 100%; max-width: var(--max-w);
      display: flex; flex-direction: column; gap: 28px;
      padding-top: 32px;
    }

    /* ─────── Welcome ─────── */
    .welcome {
      width: 100%; max-width: var(--max-w);
      text-align: center;
      padding: 76px 0 24px;
      animation: fadeIn 0.6s ease;
    }

    .welcome-logo {
      height: 36px; width: auto;
      margin-bottom: 36px;
      opacity: 0.92;
    }

    .welcome h1 {
      font-family: var(--font-display);
      font-size: 2.1rem; font-weight: 600; letter-spacing: -0.03em;
      margin-bottom: 12px;
      background: linear-gradient(160deg, var(--text) 10%, rgba(240,240,244,0.50) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .welcome p {
      color: var(--text-mid); font-size: 0.95rem; line-height: 1.65;
      max-width: 460px; margin: 0 auto 30px;
    }

    .capabilities {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      flex-wrap: wrap; margin-bottom: 38px;
    }
    .cap-badge {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 0.63rem;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 4px;
    }

    .examples {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
      max-width: 540px; margin: 0 auto;
    }
    .example {
      text-align: left; padding: 13px 15px;
      border-radius: var(--radius); border: 1px solid var(--border);
      background: rgba(10,10,15,0.65);
      color: var(--text-mid); font-family: var(--font);
      font-size: 0.84rem; line-height: 1.45;
      cursor: pointer; transition: all 0.15s;
    }
    .example:hover {
      background: rgba(0,207,255,0.05); border-color: var(--accent-border);
      color: var(--text); transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,207,255,0.07);
    }
    .example-arrow {
      display: block; margin-bottom: 6px;
      font-family: var(--mono); font-size: 0.7rem;
      color: var(--accent); opacity: 0.65;
    }

    @media (max-width: 520px) {
      .examples { grid-template-columns: 1fr; }
      .welcome { padding-top: 48px; }
      .welcome h1 { font-size: 1.65rem; }
    }

    /* ─────── Messages ─────── */
    .msg { display: flex; flex-direction: column; gap: 8px; animation: fadeIn 0.25s ease; }
    .msg-role {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono); font-size: 0.64rem;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim);
    }
    .role-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); }
    .msg.user .role-dot { background: rgba(0,207,255,0.55); }
    .msg.bot .role-dot {
      background: var(--accent);
      box-shadow: 0 0 7px rgba(0,207,255,0.55);
    }

    .msg-body {
      font-family: var(--font);
      font-size: 0.97rem; line-height: 1.68; color: var(--text);
      white-space: pre-wrap; word-wrap: break-word;
    }
    .msg.user .msg-body {
      padding: 13px 17px;
      background: rgba(0,207,255,0.05);
      border: 1px solid rgba(0,207,255,0.11);
      border-radius: var(--radius);
    }

    /* Citation pills */
    .cite {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 17px; height: 17px; padding: 0 4px; margin: 0 1px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      font-family: var(--mono); font-size: 0.61rem; font-weight: 500;
      border: 1px solid var(--accent-border);
      cursor: pointer; transition: all 0.13s;
      vertical-align: 2px;
    }
    .cite:hover {
      background: rgba(0,207,255,0.16);
      transform: translateY(-1px);
    }

    /* Sources */
    .sources {
      margin-top: 14px;
      display: flex; flex-direction: column; gap: 5px;
      animation: fadeIn 0.4s ease;
    }
    .sources-head {
      font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px;
    }
    .source {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: rgba(10,10,15,0.65);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.81rem; color: var(--text-mid);
      transition: border-color 0.13s, background 0.13s;
    }
    .source:hover { border-color: var(--border-mid); background: rgba(255,255,255,0.02); }
    .source-num {
      flex-shrink: 0; width: 20px; height: 20px; border-radius: 4px;
      background: var(--accent-dim); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.64rem; font-weight: 500;
    }
    .source-meta { flex: 1; min-width: 0; overflow: hidden; }
    .source-name {
      color: var(--text); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .source-detail {
      font-size: 0.69rem; color: var(--text-dim);
      margin-top: 1px; font-family: var(--mono);
    }
    .source-score {
      flex-shrink: 0;
      font-family: var(--mono); font-size: 0.64rem; color: var(--text-dim);
    }
    .source.highlight {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    /* Streaming cursor */
    .cursor {
      display: inline-block; width: 6px; height: 0.9em;
      background: var(--accent);
      vertical-align: -1px; margin-left: 2px;
      animation: blink 1s steps(2, start) infinite;
      border-radius: 1px;
    }
    @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }

    /* Error */
    .status-line {
      font-size: 0.82rem; color: var(--danger);
      padding: 10px 14px; border-radius: var(--radius-sm);
      background: rgba(248,113,113,0.05); border: 1px solid rgba(248,113,113,0.18);
    }

    /* ─────── Input bar ─────── */
    .composer-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 20px 16px 26px;
      background: linear-gradient(180deg, transparent 0%, rgba(5,5,7,0.90) 40%, var(--bg) 100%);
      z-index: 5; pointer-events: none;
    }
    .composer {
      max-width: var(--max-w); margin: 0 auto; pointer-events: auto;
    }
    form#chat-form {
      display: flex; align-items: flex-end; gap: 10px;
      padding: 10px 10px 10px 18px;
      background: rgba(10,10,15,0.96);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.3);
      transition: border-color 0.18s, box-shadow 0.18s;
      backdrop-filter: blur(16px);
    }
    form#chat-form:focus-within {
      border-color: rgba(0,207,255,0.32);
      box-shadow: 0 20px 64px rgba(0,0,0,0.55), 0 0 0 3px rgba(0,207,255,0.09);
    }
    textarea#question {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font);
      font-size: 0.95rem; line-height: 1.52;
      resize: none; max-height: 220px; min-height: 28px; padding: 6px 0;
    }
    textarea#question::placeholder { color: var(--text-dim); }
    button#send {
      flex-shrink: 0; width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      background: var(--accent); color: var(--bg);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    button#send:hover:not(:disabled) {
      background: #1ad8ff; transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(0,207,255,0.38);
    }
    button#send:disabled {
      background: rgba(255,255,255,0.06); color: var(--text-dim);
      cursor: not-allowed; transform: none; box-shadow: none;
    }
    .composer-hint {
      text-align: center; color: var(--text-dim);
      font-family: var(--mono); font-size: 0.62rem;
      margin-top: 9px; letter-spacing: 0.07em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.13); }
  </style>
</head>
<body>
  <div class="bg-orb"></div>

  <header>
    <img src="https://noxera-labs.de/logo.svg" alt="Noxera" class="header-logo" />
    <div class="header-divider"></div>
    <span class="header-tag">AI Chat</span>
    <div class="header-spacer"></div>
    <div class="header-status">
      <span class="status-dot"></span>
      <span>RAG aktiv</span>
    </div>
  </header>

  <main>
    <div id="welcome" class="welcome">
      <img src="https://noxera-labs.de/logo.svg" alt="Noxera" class="welcome-logo" />
      <h1>Womit kann ich helfen?</h1>
      <p>Ich analysiere Ihre Unternehmens&shy;dokumente und antworte präzise mit direkten Verweisen auf die Quellen.</p>
      <div class="capabilities">
        <span class="cap-badge">RAG-System</span>
        <span class="cap-badge">Echtzeit-Streaming</span>
        <span class="cap-badge">Quellenangaben</span>
        <span class="cap-badge">PDF-Dokumente</span>
      </div>
      <div class="examples" id="examples">
        <button class="example" data-q="Worum geht es in den Dokumenten?">
          <span class="example-arrow">→</span>
          Worum geht es in den Dokumenten?
        </button>
        <button class="example" data-q="Fasse die wichtigsten Punkte zusammen.">
          <span class="example-arrow">→</span>
          Fasse die wichtigsten Punkte zusammen.
        </button>
        <button class="example" data-q="Was sind die zentralen Aussagen?">
          <span class="example-arrow">→</span>
          Was sind die zentralen Aussagen?
        </button>
        <button class="example" data-q="Gib mir einen kurzen Überblick.">
          <span class="example-arrow">→</span>
          Gib mir einen kurzen Überblick.
        </button>
      </div>
    </div>

    <div class="stream" id="stream"></div>
  </main>

  <div class="composer-wrap">
    <div class="composer">
      <form id="chat-form" autocomplete="off">
        <textarea id="question" rows="1" placeholder="Frag etwas zu den Dokumenten…" required></textarea>
        <button id="send" type="submit" title="Senden" aria-label="Senden">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </form>
      <div class="composer-hint">Enter · Senden &nbsp;·&nbsp; Shift+Enter · Zeilenumbruch</div>
    </div>
  </div>

  <script>
    const stream  = document.getElementById('stream');
    const welcome = document.getElementById('welcome');
    const form    = document.getElementById('chat-form');
    const input   = document.getElementById('question');
    const sendBtn = document.getElementById('send');

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 220) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    document.querySelectorAll('.example').forEach((el) => {
      el.addEventListener('click', () => {
        input.value = el.dataset.q;
        form.requestSubmit();
      });
    });

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderWithCitations(text) {
      const escaped = escapeHtml(text);
      return escaped.replace(/\[(\d{1,2})\]/g, (_, n) =>
        `<span class="cite" data-cite="${n}" title="Quelle ${n}">${n}</span>`
      );
    }

    function attachCiteHandlers(scope, sourcesEl) {
      scope.querySelectorAll('.cite').forEach((el) => {
        el.addEventListener('click', () => {
          const n = el.dataset.cite;
          const target = sourcesEl?.querySelector(`[data-source="${n}"]`);
          if (!target) return;
          target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          target.classList.add('highlight');
          setTimeout(() => target.classList.remove('highlight'), 1400);
        });
      });
    }

    function appendMsg(role, body) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.innerHTML = `
        <div class="msg-role"><span class="role-dot"></span>${role === 'user' ? 'Du' : 'Assistent'}</div>
        <div class="msg-body"></div>
      `;
      el.querySelector('.msg-body').textContent = body;
      stream.appendChild(el);
      scrollToBottom();
      return el;
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function renderSources(parent, sources) {
      const wrap = document.createElement('div');
      wrap.className = 'sources';
      wrap.innerHTML = `<div class="sources-head">Quellen</div>` + sources.map(s => `
        <div class="source" data-source="${s.index}">
          <div class="source-num">${s.index}</div>
          <div class="source-meta">
            <div class="source-name">${escapeHtml(s.filename)}</div>
            <div class="source-detail">Abschnitt ${s.chunk_index} &nbsp;·&nbsp; Relevanz ${(s.relevance_score * 100).toFixed(0)}%</div>
          </div>
        </div>
      `).join('');
      parent.appendChild(wrap);
      return wrap;
    }

    async function ask(question) {
      welcome.style.display = 'none';
      appendMsg('user', question);

      const botEl  = appendMsg('bot', '');
      const bodyEl = botEl.querySelector('.msg-body');
      bodyEl.innerHTML = '<span class="cursor"></span>';

      sendBtn.disabled = true;
      input.disabled   = true;

      let fullText  = '';
      let sourcesEl = null;

      try {
        const res = await fetch('/query/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        if (!res.ok || !res.body) throw new Error('Verbindung fehlgeschlagen.');

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf('\n\n')) !== -1) {
            const rawEvent = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            const lines = rawEvent.split('\n');
            let eventName = 'message', dataStr = '';
            for (const line of lines) {
              if (line.startsWith('event:'))      eventName  = line.slice(6).trim();
              else if (line.startsWith('data:')) dataStr   += line.slice(5).trim();
            }
            if (!dataStr) continue;
            let payload;
            try { payload = JSON.parse(dataStr); } catch { continue; }

            if (eventName === 'sources') {
              sourcesEl = renderSources(botEl, payload.sources || []);
            } else if (eventName === 'token') {
              fullText += payload.text || '';
              bodyEl.innerHTML = renderWithCitations(fullText) + '<span class="cursor"></span>';
              attachCiteHandlers(bodyEl, sourcesEl);
              scrollToBottom();
            } else if (eventName === 'error') {
              throw new Error(payload.message || 'Unbekannter Fehler');
            } else if (eventName === 'done') {
              bodyEl.innerHTML = renderWithCitations(fullText);
              attachCiteHandlers(bodyEl, sourcesEl);
            }
          }
        }
      } catch (err) {
        bodyEl.innerHTML = `<div class="status-line">${escapeHtml(err.message || String(err))}</div>`;
      } finally {
        sendBtn.disabled = false;
        input.disabled   = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      input.style.height = 'auto';
      ask(q);
    });

    input.focus();
  </script>
</body>
</html>
