<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noxera Labs · Assistent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    :root {
      --bg:          #070c14;
      --s1:          #0b1221;
      --s2:          #0f1829;
      --border:      rgba(255,255,255,0.07);
      --border-mid:  rgba(255,255,255,0.14);

      --teal:        #00d4aa;
      --teal-dim:    rgba(0,212,170,0.10);
      --teal-glow:   rgba(0,212,170,0.32);
      --blue:        #38bdf8;

      --text:        #e6eef9;
      --text-mid:    #a3b5cb;
      --text-dim:    #6a7f97;

      --danger:      #f87171;

      --radius-sm:   8px;
      --radius:      14px;
      --radius-lg:   20px;

      --font:        'Sora', sans-serif;
      --mono:        'IBM Plex Mono', monospace;

      --max-w:       760px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed;
      top: -200px; left: -120px; width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ─────── Header ─────── */
    header {
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(7,12,20,0.78);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .logo {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      display: flex; align-items: center; justify-content: center;
      color: var(--bg); font-weight: 800; font-size: 0.78rem;
      box-shadow: 0 0 0 1px rgba(0,212,170,0.25), 0 6px 24px rgba(0,212,170,0.18);
    }
    .brand { font-weight: 600; letter-spacing: -0.01em; font-size: 0.95rem; }
    .brand-dim { color: var(--text-dim); font-family: var(--mono); font-size: 0.72rem; margin-left: 6px; }

    /* ─────── Main scroll area ─────── */
    main {
      flex: 1;
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 240px;
    }

    .stream {
      width: 100%; max-width: var(--max-w);
      display: flex; flex-direction: column; gap: 28px;
      padding-top: 32px;
    }

    /* ─────── Welcome ─────── */
    .welcome {
      width: 100%; max-width: var(--max-w);
      text-align: center;
      padding: 80px 0 24px;
      animation: fadeIn 0.5s ease;
    }
    .welcome h1 {
      font-size: 2rem; font-weight: 600; letter-spacing: -0.025em;
      margin-bottom: 10px;
      background: linear-gradient(180deg, var(--text) 0%, var(--text-mid) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome p {
      color: var(--text-mid); font-size: 0.95rem; line-height: 1.55;
      max-width: 520px; margin: 0 auto 36px;
    }
    .examples {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
      max-width: 560px; margin: 0 auto;
    }
    .example {
      text-align: left; padding: 14px 16px;
      border-radius: var(--radius); border: 1px solid var(--border);
      background: rgba(15,24,41,0.5);
      color: var(--text-mid); font-size: 0.85rem; line-height: 1.45;
      cursor: pointer; transition: all 0.15s;
      font-family: var(--font);
    }
    .example:hover {
      background: rgba(0,212,170,0.06); border-color: rgba(0,212,170,0.28);
      color: var(--text); transform: translateY(-1px);
    }
    @media (max-width: 520px) {
      .examples { grid-template-columns: 1fr; }
      .welcome { padding-top: 48px; }
      .welcome h1 { font-size: 1.6rem; }
    }

    /* ─────── Messages ─────── */
    .msg { display: flex; flex-direction: column; gap: 8px; animation: fadeIn 0.25s ease; }
    .msg-role {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-dim);
    }
    .role-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
    .msg.user .role-dot { background: var(--blue); }
    .msg.bot .role-dot { background: var(--teal); }

    .msg-body {
      font-size: 1rem; line-height: 1.62; color: var(--text);
      white-space: pre-wrap; word-wrap: break-word;
    }
    .msg.user .msg-body {
      padding: 14px 18px;
      background: rgba(56,189,248,0.06);
      border: 1px solid rgba(56,189,248,0.14);
      border-radius: var(--radius);
    }

    /* Citation pills inline */
    .cite {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      margin: 0 1px;
      border-radius: 5px;
      background: var(--teal-dim);
      color: var(--teal);
      font-family: var(--mono); font-size: 0.65rem; font-weight: 600;
      border: 1px solid rgba(0,212,170,0.28);
      cursor: pointer; transition: all 0.13s;
      vertical-align: 1px;
    }
    .cite:hover {
      background: rgba(0,212,170,0.18);
      transform: translateY(-1px);
    }

    /* Sources */
    .sources {
      margin-top: 14px;
      display: flex; flex-direction: column; gap: 6px;
      animation: fadeIn 0.4s ease;
    }
    .sources-head {
      font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 4px;
    }
    .source {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: rgba(15,24,41,0.5);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.82rem; color: var(--text-mid);
      transition: border-color 0.13s;
    }
    .source:hover { border-color: var(--border-mid); }
    .source-num {
      flex-shrink: 0;
      width: 22px; height: 22px; border-radius: 5px;
      background: var(--teal-dim); color: var(--teal);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.7rem; font-weight: 600;
    }
    .source-meta { flex: 1; min-width: 0; overflow: hidden; }
    .source-name {
      color: var(--text); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .source-detail { font-size: 0.72rem; color: var(--text-dim); margin-top: 1px; }
    .source-score {
      flex-shrink: 0;
      font-family: var(--mono); font-size: 0.68rem;
      color: var(--text-dim);
    }
    .source.highlight {
      border-color: var(--teal);
      background: rgba(0,212,170,0.08);
    }

    /* Cursor blink while streaming */
    .cursor {
      display: inline-block; width: 7px; height: 1em;
      background: var(--teal);
      vertical-align: -2px; margin-left: 2px;
      animation: blink 1s steps(2, start) infinite;
      border-radius: 1px;
    }
    @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }

    /* Error / status */
    .status-line {
      font-size: 0.82rem; color: var(--danger);
      padding: 10px 14px; border-radius: var(--radius-sm);
      background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.2);
    }

    /* ─────── Input bar ─────── */
    .composer-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 16px 24px;
      background: linear-gradient(180deg, transparent 0%, var(--bg) 50%);
      z-index: 5;
      pointer-events: none;
    }
    .composer {
      max-width: var(--max-w);
      margin: 0 auto;
      pointer-events: auto;
    }
    form#chat-form {
      display: flex; align-items: flex-end; gap: 10px;
      padding: 10px 10px 10px 18px;
      background: rgba(15,24,41,0.92);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.2);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    form#chat-form:focus-within {
      border-color: rgba(0,212,170,0.4);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45), 0 0 0 3px rgba(0,212,170,0.12);
    }
    textarea#question {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font);
      font-size: 0.96rem; line-height: 1.5;
      resize: none; max-height: 220px; min-height: 28px;
      padding: 6px 0;
    }
    textarea#question::placeholder { color: var(--text-dim); }
    button#send {
      flex-shrink: 0;
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--teal); color: var(--bg);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    button#send:hover:not(:disabled) {
      background: #00e8ba; transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,212,170,0.4);
    }
    button#send:disabled {
      background: rgba(255,255,255,0.06); color: var(--text-dim);
      cursor: not-allowed; transform: none; box-shadow: none;
    }
    .composer-hint {
      text-align: center; color: var(--text-dim);
      font-family: var(--mono); font-size: 0.66rem;
      margin-top: 8px; letter-spacing: 0.06em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
  </style>
</head>
<body>
  <header>
    <div class="logo">N</div>
    <div>
      <span class="brand">Noxera Labs</span>
      <span class="brand-dim">· Assistant</span>
    </div>
  </header>

  <main>
    <div id="welcome" class="welcome">
      <h1>Hallo. Womit kann ich helfen?</h1>
      <p>Ich kenne die hinterlegten Unternehmens-Dokumente und antworte mit Verweisen auf die Quelle.</p>
      <div class="examples" id="examples">
        <button class="example" data-q="Worum geht es in den Dokumenten?">Worum geht es in den Dokumenten?</button>
        <button class="example" data-q="Fasse die wichtigsten Punkte zusammen.">Fasse die wichtigsten Punkte zusammen.</button>
        <button class="example" data-q="Was sind die zentralen Aussagen?">Was sind die zentralen Aussagen?</button>
        <button class="example" data-q="Gib mir einen kurzen Überblick.">Gib mir einen kurzen Überblick.</button>
      </div>
    </div>

    <div class="stream" id="stream"></div>
  </main>

  <div class="composer-wrap">
    <div class="composer">
      <form id="chat-form" autocomplete="off">
        <textarea id="question" rows="1" placeholder="Frag etwas zu den Dokumenten…" required></textarea>
        <button id="send" type="submit" title="Senden" aria-label="Senden">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </form>
      <div class="composer-hint">Enter zum Senden · Shift+Enter für Zeilenumbruch</div>
    </div>
  </div>

  <script>
    const stream = document.getElementById('stream');
    const welcome = document.getElementById('welcome');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('question');
    const sendBtn = document.getElementById('send');

    // Auto-grow textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 220) + 'px';
    });

    // Submit on Enter (Shift+Enter = newline)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    // Example chips
    document.querySelectorAll('.example').forEach((el) => {
      el.addEventListener('click', () => {
        input.value = el.dataset.q;
        form.requestSubmit();
      });
    });

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function renderWithCitations(text) {
      // Replace [1], [2], [3]... with clickable cite spans (numbers must be 1-99)
      const escaped = escapeHtml(text);
      return escaped.replace(/\[(\d{1,2})\]/g, (_, n) =>
        `<span class="cite" data-cite="${n}" title="Quelle ${n}">${n}</span>`
      );
    }

    function attachCiteHandlers(scope, sourcesEl) {
      scope.querySelectorAll('.cite').forEach((el) => {
        el.addEventListener('click', () => {
          const n = el.dataset.cite;
          const target = sourcesEl?.querySelector(`[data-source="${n}"]`);
          if (!target) return;
          target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          target.classList.add('highlight');
          setTimeout(() => target.classList.remove('highlight'), 1400);
        });
      });
    }

    function appendMsg(role, body) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.innerHTML = `
        <div class="msg-role"><span class="role-dot"></span>${role === 'user' ? 'Du' : 'Assistent'}</div>
        <div class="msg-body"></div>
      `;
      el.querySelector('.msg-body').textContent = body;
      stream.appendChild(el);
      scrollToBottom();
      return el;
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function renderSources(parent, sources) {
      const wrap = document.createElement('div');
      wrap.className = 'sources';
      wrap.innerHTML = `<div class="sources-head">Quellen</div>` + sources.map(s => `
        <div class="source" data-source="${s.index}">
          <div class="source-num">${s.index}</div>
          <div class="source-meta">
            <div class="source-name">${escapeHtml(s.filename)}</div>
            <div class="source-detail">Abschnitt ${s.chunk_index} · Relevanz ${(s.relevance_score * 100).toFixed(0)}%</div>
          </div>
        </div>
      `).join('');
      parent.appendChild(wrap);
      return wrap;
    }

    async function ask(question) {
      welcome.style.display = 'none';
      appendMsg('user', question);

      const botEl = appendMsg('bot', '');
      const bodyEl = botEl.querySelector('.msg-body');
      bodyEl.innerHTML = '<span class="cursor"></span>';

      sendBtn.disabled = true;
      input.disabled = true;

      let fullText = '';
      let sourcesEl = null;
      let cursorEl = bodyEl.querySelector('.cursor');

      try {
        const res = await fetch('/query/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        if (!res.ok || !res.body) {
          throw new Error('Verbindung fehlgeschlagen.');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Split on SSE event boundary (\n\n)
          let idx;
          while ((idx = buffer.indexOf('\n\n')) !== -1) {
            const rawEvent = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            const lines = rawEvent.split('\n');
            let eventName = 'message';
            let dataStr = '';
            for (const line of lines) {
              if (line.startsWith('event:')) eventName = line.slice(6).trim();
              else if (line.startsWith('data:')) dataStr += line.slice(5).trim();
            }
            if (!dataStr) continue;
            let payload;
            try { payload = JSON.parse(dataStr); } catch { continue; }

            if (eventName === 'sources') {
              sourcesEl = renderSources(botEl, payload.sources || []);
            } else if (eventName === 'token') {
              fullText += payload.text || '';
              bodyEl.innerHTML = renderWithCitations(fullText) + '<span class="cursor"></span>';
              cursorEl = bodyEl.querySelector('.cursor');
              attachCiteHandlers(bodyEl, sourcesEl);
              scrollToBottom();
            } else if (eventName === 'error') {
              throw new Error(payload.message || 'Unbekannter Fehler');
            } else if (eventName === 'done') {
              // Final clean render without cursor
              bodyEl.innerHTML = renderWithCitations(fullText);
              attachCiteHandlers(bodyEl, sourcesEl);
            }
          }
        }
      } catch (err) {
        bodyEl.innerHTML = `<div class="status-line">${escapeHtml(err.message || String(err))}</div>`;
      } finally {
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      input.style.height = 'auto';
      ask(q);
    });

    input.focus();
  </script>
</body>
</html>
