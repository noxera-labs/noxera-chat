<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noxera Labs AI</title>
  <link rel="icon" href="https://noxera-labs.de/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="https://noxera-labs.de/favicon-32.png" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    :root {
      --sb:        #111113;
      --bg:        #0f0f12;
      --s1:        rgba(255,255,255,0.04);
      --s2:        rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --accent:    #00CFFF;
      --accent2:   #0c8fb8;
      --adim:      rgba(0,207,255,0.10);
      --aborder:   rgba(0,207,255,0.22);
      --text:      #F0F0F4;
      --text2:     rgba(240,240,244,0.58);
      --text3:     rgba(240,240,244,0.34);
      --danger:    #f87171;
      --green:     #22c55e;
      --fd:        'Space Grotesk', sans-serif;
      --f:         'Plus Jakarta Sans', sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --sb-w:      220px;
      --max-w:     680px;
      --r:         10px;
      --rl:        16px;
    }

    body { font-family: var(--f); background: var(--bg); color: var(--text); display: flex; }

    /* ─── Layout ─── */
    .app { display: flex; width: 100%; height: 100vh; overflow: hidden; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: var(--sb-w); flex-shrink: 0;
      background: var(--sb);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      transition: width 0.22s ease;
      position: relative; z-index: 20;
    }
    .sidebar.collapsed { width: 56px; }
    .sidebar.collapsed .sb-label,
    .sidebar.collapsed .new-chat-text,
    .sidebar.collapsed .hist-label,
    .sidebar.collapsed .chat-group,
    .sidebar.collapsed .sb-logo { opacity: 0; pointer-events: none; }
    .sidebar.collapsed .sb-footer { justify-content: center; }

    .sb-top {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 12px 12px;
      flex-shrink: 0;
    }
    .sb-toggle {
      width: 32px; height: 32px; border-radius: 8px;
      background: transparent; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3); transition: background 0.13s, color 0.13s;
      flex-shrink: 0;
    }
    .sb-toggle:hover { background: var(--s2); color: var(--text); }

    .new-chat-btn {
      flex: 1; display: flex; align-items: center; gap: 7px;
      padding: 7px 12px; border-radius: 8px;
      background: var(--accent); color: #000;
      border: none; cursor: pointer; font-family: var(--fd);
      font-size: 0.82rem; font-weight: 600;
      transition: all 0.15s; white-space: nowrap; overflow: hidden;
    }
    .new-chat-btn:hover { background: #1ad8ff; box-shadow: 0 4px 16px rgba(0,207,255,0.3); }
    .new-chat-text { transition: opacity 0.18s; }

    .sb-history {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 4px 8px 8px;
    }
    .sb-history::-webkit-scrollbar { width: 4px; }
    .sb-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .hist-label {
      font-family: var(--mono); font-size: 0.6rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text3); padding: 8px 6px 6px;
      white-space: nowrap; overflow: hidden;
      transition: opacity 0.18s;
    }

    .chat-group { margin-bottom: 4px; transition: opacity 0.18s; }
    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 5px 6px; border-radius: 6px;
      background: transparent; border: none; cursor: pointer;
      color: var(--text3); font-family: var(--f); font-size: 0.75rem;
      transition: background 0.12s, color 0.12s;
    }
    .group-header:hover { background: var(--s1); color: var(--text2); }
    .chevron { transition: transform 0.2s; flex-shrink: 0; }
    .chat-group.collapsed .chevron { transform: rotate(-90deg); }
    .chat-group.collapsed .group-items { display: none; }

    .group-items { padding: 2px 0; }
    .chat-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px; border-radius: 7px;
      cursor: pointer; transition: background 0.12s;
      position: relative;
    }
    .chat-item:hover { background: var(--s2); }
    .chat-item.active { background: var(--adim); }
    .chat-item.active .chat-item-title { color: var(--accent); }
    .chat-item-title {
      flex: 1; font-size: 0.82rem; color: var(--text2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-delete {
      flex-shrink: 0; opacity: 0; width: 20px; height: 20px;
      border-radius: 4px; background: transparent; border: none;
      cursor: pointer; color: var(--text3);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.12s, background 0.12s, color 0.12s;
    }
    .chat-item:hover .chat-delete { opacity: 1; }
    .chat-delete:hover { background: rgba(248,113,113,0.12); color: var(--danger); }

    .sb-footer {
      flex-shrink: 0; padding: 12px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      transition: opacity 0.18s;
    }
    .sb-logo { height: 22px; width: auto; transition: opacity 0.18s; }

    /* ─── Main ─── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; min-width: 0;
      position: relative;
    }

    /* ─── Welcome ─── */
    .welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px 16px;
      animation: fadeIn 0.5s ease;
    }
    .app-badge {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px;
    }
    .badge-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, #0a0a0f, #111118);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; box-shadow: 0 8px 32px rgba(0,207,255,0.12);
    }
    .badge-icon img { width: 32px; height: 32px; object-fit: contain; }
    .badge-tag {
      padding: 4px 10px; border-radius: 6px;
      background: var(--adim); border: 1px solid var(--aborder);
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent);
    }

    .welcome-title {
      font-family: var(--fd); font-size: 1.9rem; font-weight: 600;
      letter-spacing: -0.03em; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .model-toggle-btn {
      display: flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--s1); border: 1px solid var(--border);
      cursor: pointer; color: var(--text3);
      transition: background 0.13s, color 0.13s;
    }
    .model-toggle-btn:hover { background: var(--s2); color: var(--text2); }

    .welcome-desc {
      font-size: 0.95rem; color: var(--text2); line-height: 1.6;
      text-align: center; max-width: 420px; margin-bottom: 6px;
    }
    .welcome-by {
      font-size: 0.8rem; color: var(--text3); margin-bottom: 32px;
      font-family: var(--mono);
    }

    /* ─── Messages ─── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 28px 24px 8px;
      display: flex; flex-direction: column; gap: 24px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 6px; }

    .msg { display: flex; flex-direction: column; gap: 6px; animation: fadeIn 0.22s ease; max-width: var(--max-w); width: 100%; margin: 0 auto; }
    .msg-role {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono); font-size: 0.63rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3);
    }
    .role-dot { width: 5px; height: 5px; border-radius: 50%; }
    .msg.user .role-dot { background: rgba(0,207,255,0.55); }
    .msg.bot .role-dot { background: var(--accent); box-shadow: 0 0 6px rgba(0,207,255,0.5); }

    .msg-body { font-size: 0.96rem; line-height: 1.68; color: var(--text); white-space: pre-wrap; word-wrap: break-word; }
    .msg.user .msg-body {
      padding: 12px 16px;
      background: var(--s1); border: 1px solid var(--border);
      border-radius: var(--r);
    }

    .cite {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px; padding: 0 4px; margin: 0 1px;
      border-radius: 4px; background: var(--adim); color: var(--accent);
      font-family: var(--mono); font-size: 0.6rem; font-weight: 500;
      border: 1px solid var(--aborder); cursor: pointer;
      transition: all 0.13s; vertical-align: 2px;
    }
    .cite:hover { background: rgba(0,207,255,0.18); transform: translateY(-1px); }

    .sources { margin-top: 12px; display: flex; flex-direction: column; gap: 4px; animation: fadeIn 0.35s ease; }
    .sources-head { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
    .source {
      display: flex; align-items: center; gap: 9px; padding: 8px 11px;
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.8rem; color: var(--text2);
      transition: border-color 0.13s, background 0.13s; cursor: default;
    }
    .source:hover { border-color: var(--border2); background: var(--s2); }
    .source-num {
      flex-shrink: 0; width: 19px; height: 19px; border-radius: 4px;
      background: var(--adim); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.62rem; font-weight: 500;
    }
    .source-meta { flex: 1; min-width: 0; }
    .source-name { color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.82rem; }
    .source-detail { font-size: 0.68rem; color: var(--text3); margin-top: 1px; font-family: var(--mono); }
    .source.highlight { border-color: var(--accent); background: var(--adim); }

    .cursor { display: inline-block; width: 6px; height: 0.85em; background: var(--accent); vertical-align: -1px; margin-left: 2px; animation: blink 1s steps(2,start) infinite; border-radius: 1px; }
    @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }

    .status-line { font-size: 0.82rem; color: var(--danger); padding: 10px 14px; border-radius: 8px; background: rgba(248,113,113,0.05); border: 1px solid rgba(248,113,113,0.16); }

    /* ─── Composer ─── */
    .composer-wrap {
      flex-shrink: 0; padding: 8px 24px 20px;
      background: linear-gradient(to top, var(--bg) 75%, transparent);
    }
    .composer-inner { max-width: var(--max-w); margin: 0 auto; }

    .composer-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      border-radius: var(--rl);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      transition: border-color 0.18s, box-shadow 0.18s;
      overflow: hidden;
    }
    .composer-box:focus-within {
      border-color: rgba(0,207,255,0.28);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 3px rgba(0,207,255,0.07);
    }

    textarea#question {
      width: 100%; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--f); font-size: 0.95rem;
      line-height: 1.52; resize: none; min-height: 28px; max-height: 200px;
      padding: 14px 16px 4px;
    }
    textarea#question::placeholder { color: var(--text3); }

    .composer-toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px 10px;
    }
    .model-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 8px;
      background: var(--s1); border: 1px solid var(--border);
      cursor: pointer; color: var(--text2);
      font-family: var(--mono); font-size: 0.68rem;
      transition: background 0.13s, border-color 0.13s;
      white-space: nowrap;
    }
    .model-pill:hover { background: var(--s2); border-color: var(--border2); }
    .model-pill.open { border-color: var(--aborder); background: var(--adim); color: var(--accent); }
    .model-pill-name { color: var(--accent); font-weight: 500; }
    .model-pill svg { opacity: 0.6; transition: transform 0.18s; }
    .model-pill.open svg { transform: rotate(180deg); }

    .toolbar-spacer { flex: 1; }
    #send {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    #send:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 4px 18px rgba(0,207,255,0.35); }
    #send:disabled { background: rgba(255,255,255,0.07); color: var(--text3); cursor: not-allowed; transform: none; box-shadow: none; }

    /* ─── Quick chips ─── */
    .quick-chips {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-top: 10px; justify-content: center;
    }
    .chip {
      padding: 6px 13px; border-radius: 20px;
      background: var(--s1); border: 1px solid var(--border);
      color: var(--text2); font-size: 0.82rem; font-family: var(--f);
      cursor: pointer; transition: all 0.14s; white-space: nowrap;
    }
    .chip:hover { background: var(--adim); border-color: var(--aborder); color: var(--text); }

    /* ─── Model dropdown ─── */
    .model-dropdown {
      position: absolute; bottom: calc(100% + 8px); left: 0; right: 0;
      display: none; justify-content: center; z-index: 50;
      padding: 0 24px;
    }
    .model-dropdown.open { display: flex; }
    .model-dropdown-inner {
      background: #18181c; border: 1px solid var(--border2);
      border-radius: var(--rl); padding: 6px;
      width: 100%; max-width: var(--max-w);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeIn 0.15s ease;
    }
    .model-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 9px; cursor: pointer;
      transition: background 0.12s; border: 1px solid transparent;
    }
    .model-opt:hover { background: var(--s2); }
    .model-opt.selected { background: var(--adim); border-color: var(--aborder); }
    .model-opt-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: var(--s2); display: flex; align-items: center;
      justify-content: center; font-size: 1rem;
    }
    .model-opt-info { flex: 1; }
    .model-opt-name { font-family: var(--fd); font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .model-opt-desc { font-size: 0.75rem; color: var(--text3); margin-top: 1px; }
    .model-opt-check { color: var(--accent); opacity: 0; flex-shrink: 0; }
    .model-opt.selected .model-opt-check { opacity: 1; }

    /* ─── Sidebar overlay ─── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 15;
    }
    .sidebar-overlay.mob-open { display: block; }

    /* ─── Mobile header (hidden on desktop) ─── */
    .mob-header {
      display: none; align-items: center;
      padding: 0 12px;
      height: 54px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(15,15,18,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
    }
    .mob-toggle {
      width: 40px; height: 40px; border-radius: 10px;
      background: transparent; border: none; cursor: pointer;
      color: var(--text2); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; -webkit-tap-highlight-color: transparent;
    }
    .mob-toggle:active { background: var(--s2); }
    .mob-logo-wrap { flex: 1; display: flex; justify-content: center; }
    .mob-new-btn {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--adim); border: 1px solid var(--aborder);
      cursor: pointer; color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; -webkit-tap-highlight-color: transparent;
    }
    .mob-new-btn:active { background: rgba(0,207,255,0.18); }

    /* ─── Mobile: model dropdown as bottom sheet ─── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0; z-index: 20;
        transform: translateX(-100%);
        transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
        width: 280px !important;
        box-shadow: 4px 0 32px rgba(0,0,0,0.5);
      }
      .sidebar.mob-open { transform: translateX(0); }

      /* reset desktop collapsed styles on mobile */
      .sidebar.collapsed { width: 280px !important; }
      .sidebar.collapsed .new-chat-text,
      .sidebar.collapsed .hist-label,
      .sidebar.collapsed .chat-group,
      .sidebar.collapsed .sb-logo { opacity: 1 !important; pointer-events: auto !important; }

      .mob-header { display: flex; }
      .sb-toggle { display: none; }

      /* Welcome */
      .welcome { padding: 28px 20px 12px; justify-content: flex-start; padding-top: 40px; }
      .welcome-title { font-size: 1.55rem; }
      .welcome-desc { font-size: 0.9rem; max-width: 100%; }
      .welcome-by { margin-bottom: 20px; }
      .app-badge { margin-bottom: 14px; }
      .badge-icon { width: 42px; height: 42px; }

      /* Messages */
      .messages { padding: 16px 14px 8px; gap: 18px; }
      .msg-body { font-size: 0.93rem; }

      /* Chips: horizontal scroll, no wrap */
      .quick-chips {
        flex-wrap: nowrap;
        overflow-x: auto; overflow-y: hidden;
        justify-content: flex-start;
        padding-bottom: 4px;
        margin-left: -2px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .quick-chips::-webkit-scrollbar { display: none; }
      .chip { flex-shrink: 0; font-size: 0.8rem; padding: 7px 14px; }

      /* Composer */
      .composer-wrap {
        padding: 6px 12px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      }
      textarea#question { font-size: 16px; } /* prevent iOS zoom */
      #send { width: 38px; height: 38px; border-radius: 10px; }

      /* Model dropdown → bottom sheet */
      .model-dropdown {
        position: fixed !important;
        bottom: 0 !important; left: 0 !important; right: 0 !important;
        top: auto !important;
        padding: 0 !important;
        align-items: flex-end;
      }
      .model-dropdown-inner {
        width: 100% !important; max-width: 100% !important;
        border-radius: 20px 20px 0 0 !important;
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
        border-bottom: none !important;
      }
      .model-dropdown-inner::before {
        content: '';
        display: block; width: 36px; height: 4px;
        background: rgba(255,255,255,0.15); border-radius: 2px;
        margin: 4px auto 12px;
      }
      .model-opt { padding: 13px 14px; }
      .model-opt-icon { width: 36px; height: 36px; }

      /* Chat items: always show delete on mobile */
      .chat-delete { opacity: 0.6 !important; }
      .chat-item { padding: 8px 10px; }
      .chat-item-title { font-size: 0.85rem; }
    }

    /* iOS safe area for home indicator */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .composer-wrap {
        padding-bottom: calc(20px + env(safe-area-inset-bottom));
      }
      @media (max-width: 768px) {
        .composer-wrap {
          padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
      }
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 6px; }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="overlay"></div>

<div class="app">
  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <button class="sb-toggle" id="sb-toggle" title="Sidebar ein/ausblenden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="new-chat-btn" id="new-chat-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="new-chat-text">Neuer Chat</span>
      </button>
    </div>

    <div class="sb-history" id="sb-history">
      <div class="hist-label">Chat-Verlauf</div>
      <div id="history-groups"></div>
    </div>

    <div class="sb-footer">
      <img src="https://noxera-labs.de/logo.svg" alt="Noxera" class="sb-logo" />
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <div class="main" id="main">
    <!-- Mobile header -->
    <div class="mob-header">
      <button class="mob-toggle" id="mob-toggle" aria-label="Menü öffnen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="mob-logo-wrap">
        <img src="https://noxera-labs.de/logo.svg" alt="Noxera" style="height:22px;width:auto;" />
      </div>
      <button class="mob-new-btn" id="mob-new-btn" aria-label="Neuer Chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <!-- Welcome -->
    <div class="welcome" id="welcome">
      <div class="app-badge">
        <div class="badge-icon">
          <img src="https://noxera-labs.de/favicon.svg" alt="" onerror="this.style.display='none'" />
        </div>
        <span class="badge-tag">AI Chat</span>
      </div>
      <h1 class="welcome-title">
        Noxera Labs AI
        <button class="model-toggle-btn" id="model-toggle-btn" title="Modell wählen">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
      </h1>
      <p class="welcome-desc">KI-Assistent mit Zugriff auf Noxera Labs Dokumente. Stell allgemeine Fragen oder frag gezielt zu Projekten, Team und Services.</p>
      <p class="welcome-by">von Noah Wilm &amp; Raphael Ghazaryan</p>
    </div>

    <!-- Messages -->
    <div class="messages" id="stream" style="display:none;"></div>

    <!-- Composer -->
    <div class="composer-wrap" style="position:relative;">
      <div class="model-dropdown" id="model-dropdown">
        <div class="model-dropdown-inner" id="model-dropdown-inner"></div>
      </div>

      <div class="composer-inner">
        <div class="composer-box">
          <form id="chat-form" autocomplete="off">
            <textarea id="question" rows="1" placeholder="Nachricht eingeben…" required></textarea>
            <div class="composer-toolbar">
              <button type="button" class="model-pill" id="model-pill-btn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
                <span class="model-pill-name" id="model-pill-name">Sonnet 4.6</span>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="toolbar-spacer"></div>
              <button id="send" type="submit" title="Senden" aria-label="Senden">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              </button>
            </div>
          </form>
        </div>

        <div class="quick-chips" id="quick-chips">
          <button class="chip" data-q="Was bietet Noxera Labs an?">Über Noxera Labs</button>
          <button class="chip" data-q="Wer ist Noah Wilm?">Wer ist Noah?</button>
          <button class="chip" data-q="Wer ist Raphael Ghazaryan?">Wer ist Raphael?</button>
          <button class="chip" data-q="Welche KI-Lösungen bietet Noxera Labs an?">KI-Lösungen</button>
          <button class="chip" data-q="Wie kann ich Noxera Labs kontaktieren?">Kontakt</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Models ───
const MODELS = [
  { id: 'claude-haiku-4-5-20251001', name: 'Haiku 4.5',  short: 'Haiku 4.5',  desc: 'Schnell & sparsam', icon: '⚡' },
  { id: 'claude-sonnet-4-6',         name: 'Sonnet 4.6', short: 'Sonnet 4.6', desc: 'Ausgewogen',         icon: '✦' },
  { id: 'claude-opus-4-7',           name: 'Opus 4.7',   short: 'Opus 4.7',   desc: 'Leistungsstark',    icon: '◈' },
];
let selectedModel = localStorage.getItem('nx_model') || 'claude-sonnet-4-6';

// ─── Store ───
const store = {
  KEY: 'nx_chats_v2',
  all()       { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); },
  save(c)     { localStorage.setItem(this.KEY, JSON.stringify(c)); },
  get(id)     { return this.all().find(c => c.id === id); },
  create()    {
    const c = { id: crypto.randomUUID(), title: 'Neuer Chat', model: selectedModel, createdAt: Date.now(), messages: [] };
    const a = this.all(); a.unshift(c); this.save(a); return c;
  },
  update(id, fn) { this.save(this.all().map(c => c.id === id ? fn({...c}) : c)); },
  delete(id)  { this.save(this.all().filter(c => c.id !== id)); },
  addMsg(id, msg) { this.update(id, c => { c.messages.push(msg); return c; }); },
  setTitle(id, t) { this.update(id, c => { c.title = t; return c; }); },
};

// ─── State ───
let currentChatId = null;

// ─── Refs ───
const sidebarEl   = document.getElementById('sidebar');
const overlayEl   = document.getElementById('overlay');
const histGroups  = document.getElementById('history-groups');
const streamEl    = document.getElementById('stream');
const welcomeEl   = document.getElementById('welcome');
const inputEl     = document.getElementById('question');
const sendBtn     = document.getElementById('send');
const form        = document.getElementById('chat-form');
const modelDrop   = document.getElementById('model-dropdown');
const modelInner  = document.getElementById('model-dropdown-inner');
const modelPill   = document.getElementById('model-pill-btn');
const modelPillNm = document.getElementById('model-pill-name');
const quickChips  = document.getElementById('quick-chips');

// ─── Helpers ───
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderCitations(text) {
  return esc(text).replace(/\[(\d{1,2})\]/g, (_, n) =>
    `<span class="cite" data-cite="${n}" title="Quelle ${n}">${n}</span>`);
}
function citeHandlers(scope, srcEl) {
  scope.querySelectorAll('.cite').forEach(el => {
    el.addEventListener('click', () => {
      const t = srcEl?.querySelector(`[data-source="${el.dataset.cite}"]`);
      if (!t) return;
      t.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      t.classList.add('highlight');
      setTimeout(() => t.classList.remove('highlight'), 1400);
    });
  });
}
function scrollBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); streamEl.scrollTop = streamEl.scrollHeight; }

// ─── Model UI ───
function getModel() { return MODELS.find(m => m.id === selectedModel) || MODELS[1]; }
function updateModelPill() {
  const m = getModel();
  modelPillNm.textContent = m.short;
}
function renderModelDropdown() {
  modelInner.innerHTML = MODELS.map(m => `
    <div class="model-opt ${m.id === selectedModel ? 'selected' : ''}" data-id="${m.id}">
      <div class="model-opt-icon">${m.icon}</div>
      <div class="model-opt-info">
        <div class="model-opt-name">${m.name}</div>
        <div class="model-opt-desc">${m.desc}</div>
      </div>
      <svg class="model-opt-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  `).join('');
  modelInner.querySelectorAll('.model-opt').forEach(el => {
    el.addEventListener('click', () => {
      selectedModel = el.dataset.id;
      localStorage.setItem('nx_model', selectedModel);
      updateModelPill();
      closeModelDrop();
      renderModelDropdown();
    });
  });
}
function openModelDrop()  { modelDrop.classList.add('open'); modelPill.classList.add('open'); renderModelDropdown(); }
function closeModelDrop() { modelDrop.classList.remove('open'); modelPill.classList.remove('open'); }
modelPill.addEventListener('click', e => { e.stopPropagation(); modelDrop.classList.contains('open') ? closeModelDrop() : openModelDrop(); });
document.getElementById('model-toggle-btn').addEventListener('click', e => { e.stopPropagation(); modelDrop.classList.contains('open') ? closeModelDrop() : openModelDrop(); });
document.addEventListener('click', e => { if (!modelDrop.contains(e.target) && !modelPill.contains(e.target)) closeModelDrop(); });

// ─── Sidebar ───
let sidebarCollapsed = false;
document.getElementById('sb-toggle').addEventListener('click', () => {
  sidebarCollapsed = !sidebarCollapsed;
  sidebarEl.classList.toggle('collapsed', sidebarCollapsed);
});
document.getElementById('mob-toggle').addEventListener('click', () => {
  sidebarEl.classList.add('mob-open');
  overlayEl.classList.add('mob-open');
});
overlayEl.addEventListener('click', () => {
  sidebarEl.classList.remove('mob-open');
  overlayEl.classList.remove('mob-open');
});

// ─── Chat list ───
function groupByDate(chats) {
  const now = Date.now();
  const tod = new Date(); tod.setHours(0,0,0,0);
  const yes = new Date(tod); yes.setDate(tod.getDate()-1);
  const wk  = new Date(tod); wk.setDate(tod.getDate()-7);
  const g = {'Heute':[], 'Gestern':[], 'Diese Woche':[], 'Älter':[]};
  for (const c of chats) {
    const d = c.createdAt;
    if (d >= tod.getTime())      g['Heute'].push(c);
    else if (d >= yes.getTime()) g['Gestern'].push(c);
    else if (d >= wk.getTime())  g['Diese Woche'].push(c);
    else                         g['Älter'].push(c);
  }
  return g;
}

function renderSidebar() {
  const groups = groupByDate(store.all());
  histGroups.innerHTML = '';
  for (const [label, items] of Object.entries(groups)) {
    if (!items.length) continue;
    const g = document.createElement('div');
    g.className = 'chat-group';
    g.innerHTML = `
      <button class="group-header">
        <span>${label}</span>
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="group-items">
        ${items.map(c => `
          <div class="chat-item ${c.id === currentChatId ? 'active' : ''}" data-id="${c.id}">
            <span class="chat-item-title">${esc(c.title)}</span>
            <button class="chat-delete" data-id="${c.id}">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        `).join('')}
      </div>`;
    histGroups.appendChild(g);
  }
  histGroups.querySelectorAll('.group-header').forEach(btn => {
    btn.addEventListener('click', () => btn.closest('.chat-group').classList.toggle('collapsed'));
  });
  histGroups.querySelectorAll('.chat-item').forEach(el => {
    el.addEventListener('click', e => { if (!e.target.closest('.chat-delete')) loadChat(el.dataset.id); });
  });
  histGroups.querySelectorAll('.chat-delete').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteChat(btn.dataset.id); });
  });
}

function loadChat(id) {
  const chat = store.get(id);
  if (!chat) return;
  currentChatId = id;
  welcomeEl.style.display = 'none';
  quickChips.style.display = 'none';
  streamEl.style.display = 'flex';
  streamEl.innerHTML = '';
  for (const msg of chat.messages) {
    if (msg.role === 'user') {
      appendUserMsg(msg.content);
    } else {
      const el = appendBotMsg('');
      const body = el.querySelector('.msg-body');
      body.innerHTML = renderCitations(msg.content);
      if (msg.sources?.length) {
        const srcEl = renderSources(el, msg.sources);
        citeHandlers(body, srcEl);
      }
    }
  }
  renderSidebar();
  scrollBottom();
}

function deleteChat(id) {
  store.delete(id);
  if (currentChatId === id) startNewChat();
  else renderSidebar();
}

function startNewChat() {
  currentChatId = null;
  streamEl.style.display = 'none';
  streamEl.innerHTML = '';
  welcomeEl.style.display = 'flex';
  quickChips.style.display = 'flex';
  inputEl.value = '';
  inputEl.style.height = 'auto';
  renderSidebar();
  inputEl.focus();
}

document.getElementById('new-chat-btn').addEventListener('click', startNewChat);
document.getElementById('mob-new-btn').addEventListener('click', startNewChat);

// ─── Message rendering ───
function appendUserMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-role"><span class="role-dot"></span>Du</div><div class="msg-body"></div>`;
  el.querySelector('.msg-body').textContent = text;
  streamEl.appendChild(el);
  scrollBottom();
  return el;
}
function appendBotMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `<div class="msg-role"><span class="role-dot"></span>Assistent</div><div class="msg-body"></div>`;
  if (text) el.querySelector('.msg-body').textContent = text;
  streamEl.appendChild(el);
  scrollBottom();
  return el;
}
function renderSources(parent, sources) {
  const wrap = document.createElement('div');
  wrap.className = 'sources';
  wrap.innerHTML = `<div class="sources-head">Quellen</div>` + sources.map(s => `
    <div class="source" data-source="${s.index}">
      <div class="source-num">${s.index}</div>
      <div class="source-meta">
        <div class="source-name">${esc(s.filename)}</div>
        <div class="source-detail">Abschnitt ${s.chunk_index} &nbsp;·&nbsp; Relevanz ${(s.relevance_score*100).toFixed(0)}%</div>
      </div>
    </div>`).join('');
  parent.appendChild(wrap);
  return wrap;
}

// ─── Input ───
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
document.querySelectorAll('.chip').forEach(el => {
  el.addEventListener('click', () => { inputEl.value = el.dataset.q; form.requestSubmit(); });
});

// ─── Submit ───
form.addEventListener('submit', async e => {
  e.preventDefault();
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  if (!currentChatId) {
    const chat = store.create();
    currentChatId = chat.id;
  }
  store.setTitle(currentChatId, q.length > 38 ? q.slice(0, 38) + '…' : q);

  welcomeEl.style.display = 'none';
  quickChips.style.display = 'none';
  streamEl.style.display = 'flex';

  store.addMsg(currentChatId, { role: 'user', content: q });
  appendUserMsg(q);

  const botEl  = appendBotMsg('');
  const bodyEl = botEl.querySelector('.msg-body');
  bodyEl.innerHTML = '<span class="cursor"></span>';

  sendBtn.disabled = true;
  inputEl.disabled = true;

  let fullText = '', sourcesEl = null;

  try {
    const res = await fetch('/query/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, model: selectedModel }),
    });
    if (!res.ok || !res.body) throw new Error('Verbindung fehlgeschlagen.');

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) !== -1) {
        const raw = buf.slice(0, idx); buf = buf.slice(idx + 2);
        let ev = 'message', data = '';
        for (const line of raw.split('\n')) {
          if (line.startsWith('event:'))      ev   = line.slice(6).trim();
          else if (line.startsWith('data:')) data += line.slice(5).trim();
        }
        if (!data) continue;
        let p; try { p = JSON.parse(data); } catch { continue; }
        if (ev === 'sources') {
          sourcesEl = renderSources(botEl, p.sources || []);
        } else if (ev === 'token') {
          fullText += p.text || '';
          bodyEl.innerHTML = renderCitations(fullText) + '<span class="cursor"></span>';
          citeHandlers(bodyEl, sourcesEl);
          scrollBottom();
        } else if (ev === 'error') {
          throw new Error(p.message || 'Fehler');
        } else if (ev === 'done') {
          bodyEl.innerHTML = renderCitations(fullText);
          citeHandlers(bodyEl, sourcesEl);
          store.addMsg(currentChatId, { role: 'bot', content: fullText, sources: sourcesEl ? (store.get(currentChatId)?.messages.at(-2)?.sources || []) : [] });
        }
      }
    }
  } catch (err) {
    bodyEl.innerHTML = `<div class="status-line">${esc(err.message || String(err))}</div>`;
  } finally {
    sendBtn.disabled = false;
    inputEl.disabled = false;
    renderSidebar();
    inputEl.focus();
  }
});

// ─── Init ───
updateModelPill();
renderSidebar();
inputEl.focus();
</script>
</body>
</html>
